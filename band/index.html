<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bad-in-a-Box</title>
    <meta name="description" content="A bad backup band. On purpose." />
    <meta name="theme-color" content="#1b1b1b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>" />
  </head>
  <body>
    <div id="app">
      <header>
        <a class="back-link" href="../">Bad Practice</a>
        <h1>Bad-in-a-Box</h1>
      </header>

      <div class="chart-display" id="chart-display"></div>

      <div class="beat-display">
        <div class="beat-dot" id="beat-0"></div>
        <div class="beat-dot" id="beat-1"></div>
        <div class="beat-dot" id="beat-2"></div>
        <div class="beat-dot" id="beat-3"></div>
      </div>

      <div class="bpm-display">
        <button class="bpm-adjust" id="bpm-down" aria-label="Decrease BPM">−</button>
        <div class="bpm-value" id="bpm-value">80</div>
        <button class="bpm-adjust" id="bpm-up" aria-label="Increase BPM">+</button>
      </div>
      <label class="slider-label" for="bpm-slider">BPM</label>
      <input type="range" id="bpm-slider" min="40" max="240" value="80" step="1" />

      <div class="picker-row">
        <div class="sound-picker">
          <label class="slider-label" for="preset-select">Chart</label>
          <select id="preset-select"></select>
        </div>
        <div class="sound-picker">
          <label class="slider-label" for="key-select">Key</label>
          <select id="key-select">
            <option value="C">C</option>
            <option value="C#">C# / Db</option>
            <option value="D">D</option>
            <option value="D#">D# / Eb</option>
            <option value="E">E</option>
            <option value="F">F</option>
            <option value="F#">F# / Gb</option>
            <option value="G" selected>G</option>
            <option value="G#">G# / Ab</option>
            <option value="A">A</option>
            <option value="A#">A# / Bb</option>
            <option value="B">B</option>
          </select>
        </div>
      </div>

      <div class="instrument-section">
        <div class="instrument-name">Bass</div>
        <div class="badness-header">
          <label class="slider-label" for="bass-badness">Badness</label>
          <span class="badness-descriptor" id="bass-badness-value">0.50</span>
        </div>
        <input type="range" id="bass-badness" min="0" max="100" value="50" step="1" />
        <div class="badness-header">
          <label class="slider-label" for="bass-volume">Volume</label>
          <span class="badness-descriptor" id="bass-volume-value">80%</span>
        </div>
        <input type="range" id="bass-volume" min="0" max="100" value="80" step="1" />
      </div>

      <div class="instrument-section">
        <div class="instrument-name">Guitar</div>
        <div class="badness-header">
          <label class="slider-label" for="guitar-badness">Badness</label>
          <span class="badness-descriptor" id="guitar-badness-value">0.50</span>
        </div>
        <input type="range" id="guitar-badness" min="0" max="100" value="50" step="1" />
        <div class="badness-header">
          <label class="slider-label" for="guitar-volume">Volume</label>
          <span class="badness-descriptor" id="guitar-volume-value">60%</span>
        </div>
        <input type="range" id="guitar-volume" min="0" max="100" value="60" step="1" />
      </div>

      <div class="instrument-section">
        <div class="instrument-name">Mandolin</div>
        <div class="badness-header">
          <label class="slider-label" for="mandolin-badness">Badness</label>
          <span class="badness-descriptor" id="mandolin-badness-value">0.50</span>
        </div>
        <input type="range" id="mandolin-badness" min="0" max="100" value="50" step="1" />
        <div class="badness-header">
          <label class="slider-label" for="mandolin-volume">Volume</label>
          <span class="badness-descriptor" id="mandolin-volume-value">50%</span>
        </div>
        <input type="range" id="mandolin-volume" min="0" max="100" value="50" step="1" />
      </div>

      <div class="controls">
        <button class="btn-start" id="start-stop">Start</button>
        <button class="btn-tap" id="tap-tempo">Tap Tempo</button>
      </div>
    </div>

    <script type="module" src="/src/band/main.ts"></script>
  </body>
</html>
